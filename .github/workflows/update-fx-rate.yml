name: Update FX Rate
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and save USD/JPY
        run: |
          for URL in \
            "https://api.frankfurter.app/latest?from=USD&to=JPY" \
            "https://open.er-api.com/v6/latest/USD" \
            "https://api.exchangerate-api.com/v4/latest/USD"; do
            RATE=$(curl -sf --max-time 10 "$URL" | python3 -c "
import sys,json
d=json.load(sys.stdin)
r=d.get('rates',{}).get('JPY')
if r and 100<float(r)<200: print(r)
" 2>/dev/null) && break
          done
          if [ -n "$RATE" ]; then
            echo "{\"usdJpy\":$RATE,\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > fx-rate.json
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add fx-rate.json
            git diff --staged --quiet || git commit -m "chore: update fx rate [skip ci]"
            git push
          fi
